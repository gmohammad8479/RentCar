<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - RentCar</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #000;
        color: grey;
    }

    /* Navbar */
    .navbar {
        width: 100%;
        padding: 25px 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(6px);
        z-index: 10;
    }

    .menu a {
        margin-left: 40px;
        color: #ddd;
        text-decoration: none;
        font-size: 16px;
        transition: 0.3s;
    }

    .menu a:hover {
        color: rgb(2, 4, 96);
    }

    /* Contact Section */
    .contact {
        padding: 160px 60px 60px;
    }

    .contact-header {
        text-align: center;
        margin-bottom: 60px;
    }

    .contact-header h1 {
        font-size: 50px;
        font-weight: 700;
        color: #ddd;
    }
    .contact-header p {
    margin-top: 25px; 
}

    .underlined {
        color: rgb(14, 4, 103);
        border-bottom: 5px solid rgb(18, 9, 137);
        padding-bottom: 5px;
    }

    .contact-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 50px;
        justify-content: center;
    }

    .contact-info,
    .contact-form {
        flex: 1;
        min-width: 300px;
    }

    /* Contact items */
    .contact-item {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        transition: 0.3s;
    }

    .contact-item:hover {
        transform: translateY(-5px);
    }

    .icon {
        font-size: 30px;
        font-weight: bold;
        color: rgb(23, 11, 129);
        margin-right: 20px;
    }

    /* Contact form */
    .contact-form {
        background: rgba(154, 32, 32, 0.15);
        padding: 30px;
        border-radius: 15px;
    }

    .contact-form input,
    .contact-form textarea {
        width: 100%;

        background: transparent;
        border: 2px solid rgb(11, 20, 144);
        color: #ddd;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 10px;
        font-size: 16px;
    }

    .contact-form button {
        width: 100%;
        background: rgb(4, 4, 98);
        color: #fff;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    .contact-form button:hover {
        background: #0b20bd;
    }

    /* Responsive */
    @media (max-width: 900px) {
        .contact-grid {
            flex-direction: column;
            gap: 40px;
        }
    }
</style>
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">

        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="vehicles.html">Vehicles</a>
            <a href="reservation.html">Reservation</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- Contact section -->
    <section class="contact">
        <div class="contact-header">
            <h1>CONTACT <span class="underlined">US</span></h1>
            
            <p>We’re here to help! Send us a message or visit our office.</p>
        </div>

        <div class="contact-grid">

            <!-- Info -->
            <div class="contact-info">
                <div class="contact-item">
                    <div class="icon">📞</div>
                    <div>
                        <h4>Phone</h4>
                        <p>+212 612 345 678</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="icon">📧</div>
                    <div>
                        <h4>Email</h4>
                        <p>Rentcarinfo@gmail.com</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="icon">📍</div>
                    <div>
                        <h4>Address</h4>
                        <p>394 Gilez, Marrakech, Morocco</p>
                    </div>
                </div>
            </div>

            <!-- Form -->
            <div class="contact-form">
                <form action="messge daz.html" method="get">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" rows="5" required></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </div>

        </div>
    </section>

</body>
</html>
